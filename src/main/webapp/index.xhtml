<!DOCTYPE html>
<html xmlns="http://www.w3c.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"
      xmlns:x="http://xpert.com/faces">
    <h:head>
        <meta charset="utf-8" />
        <meta name="viewport"    content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="" />

        <title>TRÁMITES SENADI</title>

        <link rel="shortcut icon" type="image/png" href="#{resource['images/favicon.png']}" />
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"/>

        <link rel="stylesheet" media="screen" href="http://fonts.googleapis.com/css?family=Open+Sans:300,400,700" />
        <link href="#{resource['assets/css/bootstrap.min.css']}" rel="stylesheet" />
        <link href="#{resource['assets/css/font-awesome.min.css']}" rel="stylesheet" />

        <!-- Custom styles for our template -->
        <!--<link href="resources/assets/css/bootstrap-theme.css" rel="stylesheet" />-->
        <link href="#{resource['assets/css/bootstrap-theme.css']}" rel="stylesheet" />
        <!--<link href="resources/assets/css/main.css" rel="stylesheet" /> -->
        <link href="#{resource['assets/css/main.css']}" rel="stylesheet" />

        <!-- My own style css -->
        <link href="#{resource['assets/css/style.css']}" rel="stylesheet" />
    </h:head>
    <h:body>
        <!-- Start Page Loading -->
        <div id="loader-wrapper">
            <div id="loader"></div>        
            <div class="loader-section section-left"></div>
            <div class="loader-section section-right"></div>
        </div>
        <p:growl id="mensajes" showDetail="true" life="4000"/>
        <h:form id="allform" enctype="multipart/form-data" style=" background: #e3e3e3; min-height: calc(100vh - 424px);">
            <div class="menu">
                <a href="#" class="logo"  title="Logo Senadi" ><img src="#{resource['images/sena_2.png']}" width="161px"/></a>

                <i id="edit_action" class="material-icons prefix" style="color: white; margin-left: 20px; display: inline-block">person</i>

                <p:outputLabel value="#{loginBean.nombre}" style="color: white; font-size: 18px; margin-left: 5px;" />

                <div style="float: right; display: inline-block; margin-top: 5px">                                 
                    <p:commandLink styleClass="btn_logout" actionListener="#{loginBean.logout}"
                                   oncomplete="logout(xhr, status, args)"
                                   title="CERRAR SESIÓN" immediate="true">
                        <i class="material-icons" style="font-size: 30px; ">exit_to_app</i>
                    </p:commandLink>
                </div>                
                <div style="float: right; display: inline-block;">
                    <p:commandLink styleClass="itemm" actionListener="#{tramiteBean.prepararConfiguracionCC}" 
                                   style="color: black; text-decoration: none;" 
                                   oncomplete="PF('dlgConfiguracion').show()" 
                                   rendered="#{loginBean.grupo eq 'SC_CambioCasillero' and loginBean.usuarioCambioCasillero.tipo eq 'ADMINISTRADOR'?true:false}"
                                   title="VER NOTIFICADOS" update="allform:dlgConfiguracion mensajes" >
                        <i class="material-icons" >settings</i>
                    </p:commandLink>
                </div>
                <a class="itemm" href="users.xhtml" title="Cambio Casillero" 
                   style="display: #{loginBean.grupo eq 'SC_CambioCasillero' and loginBean.usuarioCambioCasillero.tipo eq 'ADMINISTRADOR'?'block':'none'}">USUARIOS</a>
                <a class="itemm" href="cambiocasillero.xhtml" title="Cambio Casillero" 
                   style="display: #{loginBean.grupo eq 'SC_CambioCasillero'?'block':'none'}">CAMBIOS CASILLERO</a>
                <a class="activo" href="#" title="Trámites" >TRAMITES</a>
            </div>

            <br/>
            <div style="text-align: center !important; margin: 0 auto !important;">

                <p:outputLabel value="NÚMERO DE TRÁMITE: "  style="font-size: 14px; color: black; margin-right: 5px !important;" for="tramite"/>
                <p:inputText id="tramite" value="#{tramiteBean.tramiteText}" style="font-size: 14px; width: 210px;" placeholder="Ejemplo: SENADI-2024-99999" />
                <p:tooltip value="Ingrese todo el número de trámite, es decir incluyendo la palabra SENADI o IEPI" for="tramite" style="font-size: 14px" position="bottom"/>
                <p:commandButton value="BUSCAR" class="btn_peque" actionListener="#{tramiteBean.buscarTramite}" 
                                 update="mensajes panelContenedor alcancespanel tutelagepanel oposicionespanel nolineapanel derechospanel notificacionpanel" process="@parent" />
                <p:commandButton value="LIMPIAR" class="btn_peque" actionListener="#{tramiteBean.limpiarPaneles}"
                                 update="mensajes panelContenedor alcancespanel tutelagepanel tramite oposicionespanel nolineapanel derechospanel notificacionpanel" process="@parent" />
                <p:selectBooleanCheckbox value="#{tramiteBean.depurar}" title="DEPURAR DUPLICADOS" rendered="#{loginBean.depurarDuplicado}"
                                         style="margin-left: 5px;font-size: 14px; " >
                    <p:ajax event="change" listener="#{tramiteBean.enableOptions}" update="dlgDepurarDuplicados"
                            oncomplete="PF('dlgDepurarDuplicados').show()"/>
                </p:selectBooleanCheckbox>               

                <p:panelGrid columns="1" style="width: 70%; text-align: center; margin: 0 auto" id="panelContenedor" >
                    <p:outputLabel value="#{tramiteBean.tituloTramiteText}" style="font-size: 20px !important; margin-top: 5px; background: #e3e3e3; width: 100%" 
                                   rendered="#{tramiteBean.resultadopanel}"/>
                    <p:panelGrid columns="2" id="resultdata" class="noBorders" style="width: 95%" rendered="#{tramiteBean.conmarca}"
                                 columnClasses="fivety-seven-percent,forty-two-percent">

                        <p:panelGrid columns="2" style="width: 100%;" columnClasses="forty-two-percent,fivety-seven-percent">
                            <p:outputLabel value="Trámite:" for="tram" class="bordesuperior"/>
                            <p:inputText id="tram" value="#{tramiteBean.hallmarkForm.applicationNumber}" readonly="true" class="maxsize"/>

                            <p:outputLabel value="Casillero:" for="casil" class="bordesuperior"/>
                            <p:panelGrid columns="2" columnClasses="eigthy-percent, twenty-percent">
                                <p:inputText id="casil" value="#{tramiteBean.hallmarkForm.casillero}" readonly="true" class="maxsize light-blue bordesuperior"/>
                                <p:commandButton value="ver" actionListener="#{tramiteBean.prepararCasilleroHallmark}"
                                                 oncomplete="if(args.doit){PF('dlgCasillero').show();}" process="@this" 
                                                 class="btn_peque maxsize"  update="mensajes dlgCasillero frmCasillero"/>
                            </p:panelGrid>

                            <p:outputLabel value="Tipo Signo:" for="tmar" class="bordesuperior"/>
                            <p:inputText id="tmar" value="#{tramiteBean.hallmarkForm.tipoSigno}" readonly="true" class="maxsize"/>

                            <p:outputLabel value="Naturaleza Signo:" for="nats" class="bordesuperior"/>
                            <p:inputText id="nats" value="#{tramiteBean.hallmarkForm.naturalezaSigno}" readonly="true" class="maxsize"/>

                            <p:outputLabel value="Denominación:" for="dnomi" class="bordesuperior"/>
                            <p:inputTextarea id="dnomi" value="#{tramiteBean.hallmarkForm.denomination}" readonly="true" class="maxsize"/>

                            <p:outputLabel value="Fecha Presentación: " for="fprem" class="bordesuperior"/>
                            <p:inputText id="fprem" value="#{tramiteBean.hallmarkForm.applicationDate}" readonly="true" class="maxsize">
                                <f:convertDateTime pattern="yyyy-MM-dd"/>
                            </p:inputText>

                            <p:outputLabel value="Clase Niza:" for="clani" class="bordesuperior"/>
                            <p:inputText id="clani" value="#{tramiteBean.hallmarkForm.nizaClassId}" readonly="true" class="maxsize"/>

                            <p:outputLabel value="Gaceta:" for="gacet" class="bordesuperior"/>
                            <p:inputText id="gacet" value="#{tramiteBean.hallmarkForm.gaceta}" readonly="true" class="maxsize"/>

                            <p:outputLabel value="Título:" for="titm" class="bordesuperior"/>
                            <p:inputText id="titm" value="#{tramiteBean.hallmarkForm.titulo}" readonly="true" class="maxsize"/>

                            <p:outputLabel value="Fecha Título:" for="titf" class="bordesuperior"/>
                            <p:inputText id="titf" value="#{tramiteBean.hallmarkForm.fechaTitulo}" readonly="true" class="maxsize"/>

                            <p:outputLabel value="Fecha Vencimiento:" for="titvf" class="bordesuperior"/>
                            <p:inputText id="titvf" value="#{tramiteBean.hallmarkForm.fechaVencimiento}" readonly="true" class="maxsize"/>

                            <p:outputLabel value="Estado:" for="estm" class="bordesuperior"/>
                            <p:inputText id="estm" value="#{tramiteBean.hallmarkForm.estado}" readonly="true" class="maxsize"/>

                            <p:outputLabel value="Expediente:" for="expm" class="bordesuperior"/>
                            <p:inputText id="expm" value="#{tramiteBean.hallmarkForm.expedient}" readonly="true" class="maxsize"/>

                            <p:outputLabel value=""/>
                            <p:commandLink value="Ver productos" actionListener="#{tramiteBean.prepararVerProductos}" process="@parent"
                                           oncomplete="if(args.verprods){PF('dlgProductos').show();}" update="allform:dlgProductos mensajes"
                                           style="color: blue; font-size: 16px; font-weight: bold" 
                                           title="Ver productos seleccionados del trámite #{tramiteBean.hallmarkForm.applicationNumber}"/>

                        </p:panelGrid>
                        <p:panelGrid columns="1" style="width: 100%" class="noBorders" id="exped">
                            <p:outputLabel value="EXPEDIENTE" style="font-size: 14px"/>
                            <c:forEach items="#{tramiteBean.documentos}" var="expediente" id="eachdata" >
                                <p:panel>
                                    <p:commandLink value="#{expediente.tipo}" style="color: #0089ec;"
                                                   onclick="otherpage('#{tramiteBean.hallmarkForm.sitio}#{tramiteBean.hallmarkForm.id}/#{expediente.archivo}')"/>
                                </p:panel>
                            </c:forEach>
                        </p:panelGrid>
                    </p:panelGrid>

                    <p:panelGrid columns="2" id="patentepanel" class="noBorders" style="width: 95%" rendered="#{tramiteBean.conpatente}" 
                                 columnClasses="fivety-seven-percent,forty-two-percent">

                        <p:panelGrid columns="2" style="width: 100%;" columnClasses="forty-two-percent,fivety-seven-percent">
                            <p:outputLabel value="Trámite:" class="bordesuperior"/>
                            <p:inputText value="#{tramiteBean.patentForm.applicationNumber}" readonly="true" class="maxsize" style="background: #aed581 !important;"/>

                            <p:outputLabel value="Casillero:" class="bordesuperior"/>
                            <p:panelGrid columns="2" columnClasses="eigthy-percent, twenty-percent">
                                <p:inputText id="casilp" value="#{tramiteBean.patentForm.casillero}" readonly="true" class="maxsize light-blue"/>
                                <p:commandButton value="ver" actionListener="#{tramiteBean.prepararCasilleroPantent}"
                                                 oncomplete="if(args.doit){PF('dlgCasillero').show();}" process="@this" 
                                                 class="btn_peque maxsize"  update="mensajes dlgCasillero"/>
                            </p:panelGrid>

                            <p:outputLabel value="Fecha Presentación" class="bordesuperior"/>
                            <p:inputText value="#{tramiteBean.patentForm.applicationDate}" readonly="true" class="maxsize"/>

                            <p:outputLabel value="Tipo Patente:" class="bordesuperior"/>
                            <p:inputText value="#{tramiteBean.patentForm.tipo}" readonly="true" class="maxsize estiloLigth"/>

                            <p:outputLabel value="Título:" class="bordesuperior"/>
                            <p:inputTextarea value="#{tramiteBean.patentForm.title}" readonly="true" class="maxsize"/>

                            <p:outputLabel value="Clasificación Internacional:" class="bordesuperior"/>
                            <p:inputTextarea value="#{tramiteBean.patentForm.internationalClassification}" readonly="true" class="maxsize"/>

                            <p:outputLabel value="Resumen: " class="bordesuperior"/>
                            <p:inputTextarea value="#{tramiteBean.patentForm.summary}" readonly="true" class="maxsize" />

                            <p:outputLabel value="Estado:" class="bordesuperior"/>
                            <p:inputText value="#{tramiteBean.patentForm.status}" readonly="true" class="maxsize"/>

                            <p:outputLabel value="Expediente:" class="bordesuperior"/>
                            <p:inputText value="#{tramiteBean.patentForm.expedient}" readonly="true" class="maxsize"/>

                        </p:panelGrid>
                        <p:panelGrid columns="1" style="width: 100%" class="noBorders" >
                            <p:outputLabel value="EXPEDIENTE" style="font-size: 14px"/>
                            <c:forEach items="#{tramiteBean.documentos}" var="expediente" id="eachdata" >
                                <p:panel>
                                    <p:commandLink value="#{expediente.tipo}" style="color: #0089ec;"
                                                   onclick="otherpage('#{tramiteBean.patentForm.sitio}#{tramiteBean.patentForm.id}/#{expediente.archivo}')"/>
                                </p:panel>
                            </c:forEach>
                        </p:panelGrid>
                    </p:panelGrid>

                    <p:panelGrid columns="2" id="breederpanel" class="noBorders" style="width: 95%" rendered="#{tramiteBean.conbreeder}" 
                                 columnClasses="fivety-seven-percent,forty-two-percent">

                        <p:panelGrid columns="2" style="width: 100%;" columnClasses="forty-two-percent,fivety-seven-percent">
                            <p:outputLabel value="Trámite:" class="bordesuperior"/>
                            <p:inputText value="#{tramiteBean.breederForm.applicationNumber}" readonly="true" class="maxsize"/>                            

                            <p:outputLabel value="Fecha Presentación" class="bordesuperior"/>
                            <p:inputText value="#{tramiteBean.breederForm.applicationDate}" readonly="true" class="maxsize"/>

                            <p:outputLabel value="Taxón Botánico:" class="bordesuperior"/>
                            <p:inputText value="#{tramiteBean.breederForm.proposedName}" readonly="true" class="maxsize"/>

                            <p:outputLabel value="Nombre Común:" class="bordesuperior"/>
                            <p:inputTextarea value="#{tramiteBean.breederForm.commercialName}" readonly="true" class="maxsize"/>

                            <p:outputLabel value="Grupo:" class="bordesuperior"/>
                            <p:inputText value="#{tramiteBean.breederForm.group}" readonly="true" class="maxsize"/>

                            <p:outputLabel value="Estado:" class="bordesuperior"/>
                            <p:inputText value="#{tramiteBean.breederForm.estado}" readonly="true" class="maxsize"/>


                        </p:panelGrid>
                        <p:panelGrid columns="1" style="width: 100%" class="noBorders" >
                            <p:outputLabel value="EXPEDIENTE" style="font-size: 14px"/>
                            <c:forEach items="#{tramiteBean.documentos}" var="expediente" id="eachdata" >
                                <p:panel>
                                    <p:commandLink value="#{expediente.tipo}" style="color: #0089ec;"
                                                   onclick="otherpage('#{tramiteBean.breederForm.sitio}#{tramiteBean.breederForm.idVegetableForms}/#{expediente.archivo}')"/>
                                </p:panel>
                            </c:forEach>
                        </p:panelGrid>
                    </p:panelGrid>

                    <p:panelGrid columns="2" id="denominationpanel" class="noBorders" style="width: 95%" rendered="#{tramiteBean.condenomination}" 
                                 columnClasses="fivety-seven-percent,forty-two-percent">

                        <p:panelGrid columns="2" style="width: 100%;" columnClasses="forty-two-percent,fivety-seven-percent">
                            <p:outputLabel value="Trámite:" class="bordesuperior"/>
                            <p:inputText value="#{tramiteBean.denominationForms.applicationNumber}" readonly="true" class="maxsize"/>                            

                            <p:outputLabel value="Fecha Presentación:" class="bordesuperior"/>
                            <p:inputText value="#{tramiteBean.denominationForms.applicationDate}" readonly="true" class="maxsize"/>

                            <p:outputLabel value="Denominación:" class="bordesuperior"/>
                            <p:inputText value="#{tramiteBean.denominationForms.denomination}" readonly="true" class="maxsize"/>

                            <p:outputLabel value="Parte del proceso:" class="bordesuperior"/>
                            <p:inputTextarea value="#{tramiteBean.denominationForms.partOfProcess}" readonly="true" class="maxsize"/>

                            <p:outputLabel value="Lugar de inspección:" class="bordesuperior"/>
                            <p:inputText value="#{tramiteBean.denominationForms.inspectionPlace}" readonly="true" class="maxsize"/>

                            <p:outputLabel value="Estado:" class="bordesuperior"/>
                            <p:inputText value="#{tramiteBean.denominationForms.estado}" readonly="true" class="maxsize"/>

                        </p:panelGrid>
                        <p:panelGrid columns="1" style="width: 100%" class="noBorders" >
                            <p:outputLabel value="EXPEDIENTE" style="font-size: 14px"/>
                            <p:panelGrid columns="1" id="denDocumentos">
                                <c:forEach items="#{tramiteBean.documentos}" var="expediente" id="eachdata" >
                                    <p:panel >
                                        <p:commandLink value="#{expediente.tipo}" style="color: #0089ec;" immediate="true"
                                                       onclick="otherpage('#{tramiteBean.denominationForms.sitio}#{tramiteBean.denominationForms.id}/#{expediente.archivo}')"/>
                                        <p:commandLink class="link_remove" style="float: right"
                                                       process="@this" title="Eliminar documento"
                                                       actionListener="#{tramiteBean.eliminarDocumentoDenomination(expediente)}"
                                                       update="denDocumentos mensajes"
                                                       rendered="#{expediente.uploaded}"
                                                       onstart="return confirm('¿Confirma que desea eliminar este documento: #{expediente.archivo}?');" >
                                            <i id="delete_action" class="material-icons md-12" style="font-size: 20px;">delete</i>
                                        </p:commandLink>
                                    </p:panel>
                                </c:forEach>
                            </p:panelGrid>
                            <p:fileUpload listener="#{tramiteBean.uploadDocumentoDenomination}"
                                          accept=".pdf"
                                          auto="true"
                                          label="SUBIR DOCUMENTO"
                                          update="denDocumentos mensajes"                                              
                                          style="margin: 10px 0; width: 100%;">                            
                            </p:fileUpload>
                        </p:panelGrid>                        
                    </p:panelGrid>

                    <p:panel id="renewalpanel" rendered="#{tramiteBean.conmodificacion}">
                        <p:outputLabel value="MODIFICACIONES AL REGISTRO" rendered="#{!tramiteBean.hijas}"
                                       style="font-size: 20px !important; margin-top: 5px; background: #e3e3e3; width: 100%" />
                        <br/>
                        <c:forEach items="#{tramiteBean.modificaciones}" var="modificacion" id="eachdata" varStatus="i" class="maxsize">

                            <p:panelGrid columns="1" 
                                         style="display: inline-block; vertical-align: top; margin-left: 5px; border: 1px solid #e3e3e3; width: 32%;">

                                <p:panelGrid columns="2" class="noBorders" rendered="#{tramiteBean.conmodificacion}" style="width: 100%"
                                             columnClasses="forty-two-percent,fivety-seven-percent">
                                    <p:outputLabel value="Tipo: " class="bordesuperior"/>
                                    <p:inputText value="#{modificacion.tipo}" readonly="true" class="maxsize estiloLigth" />
                                    <p:outputLabel value="Trámite Modificación: " class="bordesuperior"/>
                                    <p:inputText value="#{modificacion.solicitud}" readonly="true" class="maxsize" style="background: #aed581 !important;"/>
                                    <p:outputLabel value="Fecha Presentación: " class="bordesuperior"/>
                                    <p:inputText value="#{modificacion.fechaPresentacion}" readonly="true" class="maxsize"/>
                                    <p:outputLabel value="Certificado:" class="bordesuperior"/>
                                    <p:inputText value="#{modificacion.certificado}" readonly="true" class="maxsize"/>
                                    <p:outputLabel value="Fecha Certificado:" class="bordesuperior"/>
                                    <p:inputText value="#{modificacion.fechaCertificado}" readonly="true" class="maxsize"/>
                                    <p:outputLabel value="Casillero:" class="bordesuperior"/>
                                    <p:panelGrid columns="2" columnClasses="eigthy-percent, twenty-percent">
                                        <p:inputText id="casilm" value="#{modificacion.casillero}" readonly="true" class="maxsize light-blue"/>
                                        <p:commandButton value="ver" actionListener="#{tramiteBean.prepararModificacion(modificacion)}"
                                                         oncomplete="if(args.doit){PF('dlgCasillero').show();}" process="@this" 
                                                         class="btn_peque maxsize"  update="mensajes dlgCasillero"/>
                                    </p:panelGrid>

                                    <p:outputLabel value="Título:" class="bordesuperior"/>
                                    <p:inputTextarea value="#{modificacion.titulo}" readonly="true" class="maxsize"/>
                                    <p:outputLabel value="Fecha Título" class="bordesuperior"/>
                                    <p:inputText value="#{modificacion.fechaTitulo}" readonly="true" class="maxsize"/>


                                    <p:outputLabel value="Estado:" rendered="#{!(modificacion.estado eq null)}" class="bordesuperior"/>
                                    <p:inputText value="#{modificacion.estado}" readonly="true" class="maxsize" rendered="#{!(modificacion.estado eq null)}"/>
                                </p:panelGrid>                                

                                <c:forEach items="#{modificacion.documentos}" var="documento" id="eachdata" >
                                    <p:panel>
                                        <p:commandLink value="#{documento.tipo}" style="color: #0089ec;"
                                                       onclick="otherpage('#{modificacion.sitio}#{modificacion.id}/#{documento.archivo}')"/>
                                    </p:panel>
                                </c:forEach>
                            </p:panelGrid>
                        </c:forEach>
                    </p:panel>

                    <p:panelGrid id="tutelagepanel" rendered="#{tramiteBean.contutela}" columns="1" 
                                 style="width: 70%; text-align: center; margin: 0 auto; border: 1px solid #e3e3e3;" >
                        <p:outputLabel value="TUTELAS" rendered="#{tramiteBean.hijas}" 
                                       style="font-size: 20px !important; margin-top: 5px; background: #e3e3e3; width: 100%" />
                        <br/>
                        <p:panelGrid columns="2" class="noBorders" rendered="#{tramiteBean.contutela}" style="width: 100%" 
                                     columnClasses="forty-two-percent,fivety-seven-percent">
                            <p:outputLabel value="Trámite Tutela: " class="maxsize bordesuperior"/>
                            <p:inputText value="#{tramiteBean.tutelageForm.applicationNumber}" readonly="true" class="maxsize" style="background: #aed581 !important;"/>
                            <p:outputLabel value="Casillero:" class="bordesuperior"/>
                            <p:panelGrid columns="2" columnClasses="eigthy-percent, twenty-percent">
                                <p:inputText id="casiltut" value="#{tramiteBean.tutelageForm.casillero}" readonly="true" class="maxsize light-blue"/>
                                <p:commandButton value="ver" actionListener="#{tramiteBean.prepararTutela}"
                                                 oncomplete="if(args.doit){PF('dlgCasillero').show();}" process="@this" 
                                                 class="btn_peque maxsize"  update="mensajes dlgCasillero"/>
                            </p:panelGrid>
                            <p:outputLabel value="Fecha Presentación: " class="maxsize bordesuperior"/>
                            <p:inputText value="#{tramiteBean.tutelageForm.applicationDate}" readonly="true" class="maxsize"/>
                            <p:outputLabel value="Tema:" class="bordesuperior"/>
                            <p:inputTextarea value="#{tramiteBean.tutelageForm.subject}" readonly="true" class="maxsize"/>                                    
                            <p:outputLabel value="Descripción:" class="bordesuperior"/>
                            <p:inputTextarea value="#{tramiteBean.tutelageForm.respondentDescription}" readonly="true" class="maxsize"/>                                    
                            <p:outputLabel value="Estado:" class="bordesuperior"/>
                            <p:inputText value="#{tramiteBean.tutelaAux.tutelageForm.status}" readonly="true" class="maxsize"/>
                            <p:outputLabel value="Expediente:" class="bordesuperior"/>
                            <p:inputText value="#{tramiteBean.tutelageForm.expedient}" readonly="true" class="maxsize"/>
                        </p:panelGrid>                                

                        <c:forEach items="#{tramiteBean.tutelaAux.documentos}" var="documento" id="eachdata" >
                            <p:panel style="width: 100%">
                                <p:commandLink value="#{documento.tipo}" style="color: #0089ec;"
                                               onclick="otherpage('#{tramiteBean.tutelaAux.sitio}#{tramiteBean.tutelageForm.id}/#{documento.archivo}')"/>
                            </p:panel>
                        </c:forEach>                        
                    </p:panelGrid>

                    <p:panelGrid id="derechospanel" rendered="#{tramiteBean.conderechos}" columns="1" 
                                 style="width: 70%; text-align: center; margin: 0 auto; border: 1px solid #e3e3e3;" >

                        <p:panelGrid columns="2" class="noBorders" rendered="#{tramiteBean.conderechos}" style="width: 100%"

                                        rendered="#{tramiteBean.cambiarCasillero.fechaProvidencia eq null?false:true}"
                                        mask="true" pattern="yyyy-MM-dd" title="Fecha de Providencia" inputStyleClass="maxsize greencc"/>

                            <p:outputLabel value="Visualizar Providencia: " class="bordesuperior"/>
                            <p:commandLink class="linkcas" title="Providencia"
                                           actionListener="#{tramiteBean.viewProvidenciaCambioCasillero}"
                                           process="@form" disabled="#{tramiteBean.cambiarCasillero.nuevoCasillero eq null?true:false}"
                                           update="mensajes notap"  
                                           oncomplete="popupwindow('cambiocas', '_blank', args);">
                                <i id="download_action" class="material-icons md-18">cloud_download</i>
                                <p:confirm header="VISUALIZAR PROVIDENCIA" message="SI ELIJE SI, SE ASIGNARÁ UN NÚMERO DE PROVIDENCIA AL DOCUMENTO, CONTINUAR?"/>
                            </p:commandLink>
                        </p:panelGrid>
                        <br/>
                        <p:commandButton value="CERRAR" class="btn_cerrar" onclick="PF('dlgCasillero').hide();" style="float: right" rendered="#{tramiteBean.cambioCasillero}"/>
                        <p:outputLabel id="notap" value="#{tramiteBean.notaprovidencia}" style="color: blue !important; text-decoration: underline"/>
                        <br/><br/>
                    </p:panel>

                </h:form>
            </p:dialog>

            <p:dialog id="dlgCambioCasillero" modal="true" resizable="true"
                      header="BUSCAR NUEVO CASILLERO PARA EL TRÁMITE #{tramiteBean.tramite.solicitud}" fitViewport="true"
                      widgetVar="dlgCambioCasillero" style="font-size: 11px; text-align: center;" showEffect="explode" 
                      hideEffect="explode" closeOnEscape="true" width="80%">
                <p:ajax event="close" update="dlgCambioCasillero" resetValues="true" />

                <h:form id="frmCambioCasillero" >
                    <p:outputLabel value="Criterio de búsqueda:  "/>
                    <p:inputText value="#{tramiteBean.criterioOwner}" style="width: 50%" placeholder="Ingrese un nombre o identificación"/>
                    <p:commandButton value="BUSCAR" actionListener="#{tramiteBean.buscarCasillero}" update="tablaDeCasilleros mensajes" 
                                     process="@parent" class="btn_peque"/>
                    <p:commandButton actionListener="#{tramiteBean.limpiarBusquedaCasillero}" icon="pi pi-sync" class="btn_peque"
                                     title="Limpiar los campos" update="frmCambioCasillero" process="@this"/>
                    <p:dataTable id="tablaDeCasilleros" var="owner"
                                 value="#{tramiteBean.owners}" widgetVar="tablaDeCasilleros"
                                 emptyMessage="No hay Datos para mostrar"                                              
                                 filteredValue="#{tramiteBean.ownersFiltrados}"
                                 binding="#{tramiteBean.ownerDataTable}"
                                 paginator="true"
                                 paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                 rows="10"
                                 rowsPerPageTemplate="10,50,100,150,200,250,300"
                                 style="border: black !important" 
                                 selectionMode="single"
                                 rowKey="#{owner.id}">
                        <p:column headerText="Casillero" style="text-align: center;" filterBy="#{owner.casillero}" filterMatchMode="contains">
                            <h:outputText value="#{owner.casillero}" style="font-weight: bold; font-size: 14px"/>
                        </p:column>
                        <p:column headerText="Nombre" style="text-align: center;"  filterBy="#{owner.name}" filterMatchMode="contains">
                            <h:outputText value="#{owner.name}" style="font-size: 12px"/>
                        </p:column>                        
                        <p:column headerText="Tipo Doc." style="text-align: center;"  >
                            <h:outputText value="#{owner.documentType}" style="font-size: 12px"/>
                        </p:column>
                        <p:column headerText="Documento" style="text-align: center;"  filterBy="#{owner.document}" filterMatchMode="contains">
                            <h:outputText value="#{owner.document}" style="font-size: 12px"/>
                        </p:column>
                        <p:column headerText="Email" style="text-align: center;"  filterBy="#{owner.email}" filterMatchMode="contains">
                            <h:outputText value="#{owner.email}" style="font-size: 12px"/>
                        </p:column>
                        <p:column headerText="Phone" style="text-align: center;"  >
                            <h:outputText value="#{owner.phone}" style="font-size: 12px"/>
                        </p:column>
                        <p:column headerText="Celular" style="text-align: center;"  >
                            <h:outputText value="#{owner.mobile}" style="font-size: 12px"/>
                        </p:column>                        
                        <p:column headerText="Acción" style="text-align: center">
                            <p:commandLink class="linkcas"
                                           actionListener="#{tramiteBean.seleccionarCasillero}"
                                           update="mensajes allform:frmCasillero"
                                           oncomplete="if(args.selcas){PF('dlgCambioCasillero').hide();}"
                                           process="@this" title="Seleccionar casillero #{owner.casillero}" >
                                <i class="pi pi-check"></i>
                            </p:commandLink>
                        </p:column>
                    </p:dataTable>
                </h:form>
            </p:dialog>

            <p:dialog id="dlgConfiguracion" modal="true" resizable="true"
                      header="CONFIGURACIÓN PARA CAMBIO DE CASILLERO" fitViewport="true"
                      widgetVar="dlgConfiguracion" style="font-size: 11px; text-align: center;" showEffect="explode" 
                      hideEffect="explode" closeOnEscape="true" width="80%">
                <p:ajax event="close" update="dlgConfiguracion" resetValues="true" />

                <h:form id="frmConfig" >
                    <p:dataTable id="tablaDeConfig" var="config"
                                 value="#{tramiteBean.configuraciones}" widgetVar="tablaDeDelegados"
                                 emptyMessage="No hay Datos para mostrar"                                              
                                 binding="#{tramiteBean.configDataTable}"                                 
                                 paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                 rows="20"
                                 rowsPerPageTemplate="20,50,100,150,200,250,300"
                                 style="border: black !important" 
                                 rowKey="#{config.id}"
                                 editable="true">

                        <p:ajax event="rowEdit" listener="#{tramiteBean.onRowEditConfig}" update="mensajes"/>
                        <p:ajax event="rowEditCancel" listener="#{tramiteBean.onRowCancelConfig}" update="mensajes"/>

                        <p:column headerText="Tipo" style="text-align: center;"  >
                            <p:cellEditor>
                                <f:facet name="output">
                                    <h:outputText value="#{config.tipo}"/>
                                </f:facet>
                                <f:facet name="input">
                                    <p:selectOneMenu value="#{config.tipo}" id="tiposs"  class="maxsize">
                                        <f:selectItem itemLabel="Seleccione una opción" itemValue="" noSelectionOption="true"/>
                                        <f:selectItems value="#{tramiteBean.tiposConfiguracionCC}"/>
                                    </p:selectOneMenu>
                                </f:facet>
                            </p:cellEditor>
                        </p:column>

                        <p:column headerText="Descripción" style="text-align: center;"  >
                            <p:cellEditor>
                                <f:facet name="output">
                                    <h:outputText value="#{config.nombre}"/>
                                </f:facet>
                                <f:facet name="input">
                                    <p:inputTextarea value="#{config.nombre}" style="width:100%"/>
                                </f:facet>
                            </p:cellEditor>
                        </p:column>

                        <p:column headerText="Fecha" style="text-align: center;"  >
                            <p:cellEditor>                               
                                <f:facet name="output">
                                    <h:outputText value="#{config.fecha}" >
                                        <f:convertDateTime pattern="yyyy-MM-dd"/>
                                    </h:outputText>
                                </f:facet>
                                <f:facet name="input" >
                                    <p:calendar value="#{config.fecha}" inputStyleClass="maxsize center-text" pattern="yyyy-MM-dd" navigator="true"
                                                disabled="#{(config.tipo eq 'DELEGADO' or config.tipo eq 'DELEGACIÓN')?true: false}"/>
                                </f:facet>

                            </p:cellEditor>
                        </p:column>

                        <p:column style="width:6rem">
                            <p:rowEditor editTitle="Editar Delegado" cancelTitle="Cancelar" saveTitle="Guardar Cambios"/>
                        </p:column>

                        <p:column headerText="Activo" style="text-align: center;"  >
                            <p:selectBooleanCheckbox id="deles" value="#{config.activo}"  itemLabel="#{config.activo?'ACTIVO':'INACTIVO'}" >
                                <p:ajax update="tablaDeConfig mensajes" listener="#{tramiteBean.enableConfiguracion(config)}"/>
                            </p:selectBooleanCheckbox>
                        </p:column>

                        <p:column >
                            <p:commandLink class="link_remove" actionListener="#{tramiteBean.eliminarConfiguracionCC}"
                                           update="tablaDeConfig mensajes" title="Eliminar Configuración" process="@this" >
                                <i id="delete_action" class="material-icons md-18">delete</i>
                                <p:confirm header="CONFIRMAR" message="SEGURO DE ELIMINAR EL REGISTRO #{config.nombre}?"/>
                            </p:commandLink>
                        </p:column>

                    </p:dataTable>
                    <br/>
                    <p:commandButton value="NUEVO REGISTRO" class="btn_peque" action="#{tramiteBean.onAddNewRegistro()}" 
                                     process="@this" update="mensajes tablaDeConfig" icon="pi pi-plus-circle"/>
                    <p:commandButton value="CERRAR" class="btn_peque" onclick="PF('dlgConfiguracion').hide();"/>

                </h:form>


            </p:dialog>

            <p:ajaxStatus onstart="PF('statusDialog').show()" onsuccess="PF('statusDialog').hide()" />

            <p:dialog widgetVar="statusDialog" modal="true" draggable="false" closable="false" resizable="false" showHeader="false">
                <p:graphicImage name="/images/ajax-loader.gif" />
            </p:dialog>

            <p:confirmDialog global="true" showEffect="explode" hideEffect="explode">
                <p:commandButton value="Sí" type="button" styleClass="ui-confirmdialog-yes btn_peque" update="allform:tablaDeDatos"/>
                <p:commandButton value="No" type="button"  styleClass="ui-confirmdialog-no btn_peque" />
            </p:confirmDialog>
            <br/>
        </h:form>

        <div id="footer"></div>

        <p:idleMonitor timeout="#{1000*60*120}" id="idleSesion">
            <p:ajax event="idle" listener="#{idleMonitorCtrl.idleListener}"
                    oncomplete="PF('idleDialog').show()" />
        </p:idleMonitor>
        <p:dialog header="Sesión Caducada" resizable="false"
                  widgetVar="idleDialog" modal="true" closable="false" style="font-size: 12px">
            <h:form id="sesionCaducaForm">
                <div class="titlePage">
                    <h:outputText value="Sesión Caducada " />
                    <p:commandButton styleClass="nav-link js-scroll-trigger"
                                     actionListener="#{loginBean.logout}" class="btn_peque"
                                     oncomplete="logout(xhr, status, args)"
                                     value="ACEPTAR" immediate="true" style="font-size: 12px"/>
                </div>
            </h:form>
        </p:dialog>

        <!-- JavaScript libs are placed at the end of the document so the pages load faster -->

        <!-- <script src="resources/assets/js/headroom.min.js"></script>
        <script src="resources/assets/js/jQuery.headroom.min.js"></script>
        <script src="resources/assets/js/template.js"></script> -->

    </h:body>
    <script type="text/javascript">
        $(document).ready(function () {
            setTimeout(function () {
                $('body').addClass('loaded');
                $('h1').css('color', '#222222');
                $("#footer").load("footer.html");
            }, 150);
        });

        function getIdIndex(idName) {
            var doc = document.forms['allform'];
            var i;
            var idResult = 0;
            for (i = 0; doc.length > i; i++) {
                if (doc[i].id.includes(idName)) {
                    idResult = i;
                    console.log(doc[i].id);
                    break;
                }
            }
            return idResult;
        }

        //<![CDATA[
        function popupwindow(url, title, args) {
            if (args.doit) {
                //window.open(url, title, 'location=yes,height=400,width=400,scrollbars=yes,status=yes').focus();
                window.open(url, title);
            }
        }

        function otherpage(url) {
            setTimeout(function () {
                window.open(url, '_blank');
            }, 0);
        }
        function logout(xhr, status, args) {
            setTimeout(function () {
                window.location = 'login.xhtml';
            }, 500);
        }
        //]]>
    </script>
</html>
