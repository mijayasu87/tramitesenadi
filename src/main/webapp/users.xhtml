<!DOCTYPE html>
<html xmlns="http://www.w3c.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:x="http://xpert.com/faces">
    <h:head>
        <meta charset="utf-8" />
        <meta name="viewport"    content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="" />

        <title>USUARIOS</title>

        <link rel="shortcut icon" type="image/png" href="#{resource['images/favicon.png']}" />
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"/>

        <link rel="stylesheet" media="screen" href="http://fonts.googleapis.com/css?family=Open+Sans:300,400,700" />
        <link rel="stylesheet" type="text/css" href="#{resource['assets/css/bootstrap.min.css']}" />
        <link rel="stylesheet" type="text/css" href="#{resource['assets/css/font-awesome.min.css']}" />

        <!-- Custom styles for our template -->
        <link rel="stylesheet" type="text/css" href="#{resource['assets/css/bootstrap-theme.css']}" />
        <link rel="stylesheet" type="text/css" href="#{resource['assets/css/main.css']}" />
        <!-- My own style css -->

        <link rel="stylesheet" type="text/css" href="#{resource['assets/css/style.css']}" />

        <!--<meta http-equiv="Refresh" content="{loginBean.usuario.rol.rolapp eq 'ADMINISTRADOR' ? '':'0.1;url=index.xhtml'}"/> -->
        <style>
            .ui-chkbox-all {
                display: none !important;
            }
        </style>
    </h:head>
    <h:body>
        <!-- Start Page Loading -->
        <div id="loader-wrapper">
            <div id="loader"></div>        
            <div class="loader-section section-left"></div>
            <div class="loader-section section-right"></div>
        </div>
        <p:growl id="mensajes" showDetail="true" life="4000"/>
        <h:form id="allform" enctype="multipart/form-data" style=" background: #e3e3e3; min-height: calc(100vh - 424px);">
            <div class="menu">
                <a href="#" class="logo"  title="Logo Senadi" ><img src="#{resource['images/sena_2.png']}" width="161px"/></a>

                <i id="edit_action" class="material-icons prefix" style="color: white; margin-left: 20px; display: inline-block">person</i>

                <p:outputLabel value="#{loginBean.nombre}" style="color: white; font-size: 18px" />

                <div style="float: right; display: inline-block; margin-top: 5px">

                    <p:commandLink styleClass="btn_logout" actionListener="#{loginBean.logout}"
                                   oncomplete="logout(xhr, status, args)"
                                   title="CERRAR SESIÓN" immediate="true">
                        <i class="material-icons" style="font-size: 30px; ">exit_to_app</i>
                    </p:commandLink>
                </div>
                <a class="activo" href="#" title="Usuarios" >USUARIOS</a>                
                <a class="itemm" href="cambiocasillero.xhtml" title="Cambio Casillero" 
                   style="display: #{loginBean.grupo eq 'SC_CambioCasillero'?'block':'none'}">CAMBIOS CASILLERO</a>
                <a class="itemm" href="index.xhtml" title="Trámites" >TRAMITES</a>
            </div>

            <br/>
            <p:panelGrid columns="1" style="text-align: center !important; margin: 0 auto !important; width: 70%" >                
                <p:panelGrid columns="1" class="noBorders" >                    
                    <p:panel class="panelUsuario" >
                        <p:outputLabel value="USUARIOS" style="font-size: 16px !important"/>
                        <p:dataTable id="tablaDeUsuarios" var="usuario"
                                     value="#{userBean.usuarios}" widgetVar="tablaDeUsuarios"
                                     emptyMessage="No hay Datos para mostrar"                                              
                                     binding="#{userBean.usuarioTable}"                                 
                                     paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                     rows="20" paginator="true"
                                     rowsPerPageTemplate="20,50,100,150,200,250,300"
                                     style="border: black !important" 
                                     rowKey="#{usuario.id}"
                                     editable="true">

                            <p:ajax event="rowEdit" listener="#{userBean.onRowEditUsuario}" update="mensajes"/>
                            <p:ajax event="rowEditCancel" listener="#{userBean.onRowCancelUsuario}" update="mensajes"/>


                            <p:column headerText="Usuario" style="text-align: center; font-size: 14px;"  >
                                <p:cellEditor>
                                    <f:facet name="output">
                                        <h:outputText value="#{usuario.usuario}"/>
                                    </f:facet>
                                    <f:facet name="input">
                                        <p:inputText value="#{usuario.usuario}" style="width:100%" required="true" label="Nombre de Usuario"
                                                     maxlength="50" placeholder="Ej: mjyanangomez"/>
                                    </f:facet>
                                </p:cellEditor>
                            </p:column>
                            <p:column headerText="Nombre" style="text-align: center; font-size: 14px;"  >
                                <p:cellEditor>
                                    <f:facet name="output">
                                        <h:outputText value="#{usuario.nombre}"/>
                                    </f:facet>
                                    <f:facet name="input">
                                        <p:inputText value="#{usuario.nombre}" style="width:100%" required="true" label="Nombre de Usuario"/>
                                    </f:facet>
                                </p:cellEditor>
                            </p:column>
                            <p:column headerText="Cargo" style="text-align: center; font-size: 14px;"  >
                                <p:cellEditor>                                    
                                    <f:facet name="output">
                                        <h:outputText value="#{usuario.cargo}"/>
                                    </f:facet>
                                    <f:facet name="input">
                                        <p:inputText value="#{usuario.cargo}" style="width:100%" label="Identificación"/>
                                    </f:facet>
                                </p:cellEditor>
                            </p:column>

                            <p:column style="width:6rem">
                                <p:rowEditor editTitle="Editar Usuario" cancelTitle="Cancelar" saveTitle="Guardar Cambios" />
                            </p:column>

                            <p:column headerText="Activo" style="text-align: center;"  >
                                <p:selectBooleanCheckbox id="deles" value="#{usuario.activo}"  itemLabel="#{usuario.activo?'ACTIVO':'INACTIVO'}" >
                                    <p:ajax update="tablaDeUsuarios" listener="#{userBean.enableUsuario(usuario)}"/>
                                </p:selectBooleanCheckbox>
                            </p:column>

                            <p:column style="width:5rem">
                                <p:commandLink class="link_remove" actionListener="#{userBean.eliminarUsuario}"
                                               update="tablaDeUsuarios mensajes" title="Eliminar Usuario" process="@this" >
                                    <i id="delete_action" class="material-icons md-18">delete</i>
                                    <p:confirm header="CONFIRMAR" message="SEGURO DE ELIMINAR EL USUARIO #{usuario.nombre}?"/> 
                                </p:commandLink>
                            </p:column>

                        </p:dataTable>
                        <p:commandButton title="NUEVO USUARIO" class="btn_buscar" action="#{userBean.onAddNewUsuario}" process="@this" 
                                         oncomplete="PF('tablaDeUsuarios').addRow();" update="mensajes" icon="pi pi-user-plus"/>
                    </p:panel>                    
                </p:panelGrid>
            </p:panelGrid>            

            <p:ajaxStatus onstart="PF('statusDialog').show()" onsuccess="PF('statusDialog').hide()" />

            <p:dialog widgetVar="statusDialog" modal="true" draggable="false" closable="false" resizable="false" showHeader="false">
                <p:graphicImage name="/images/ajax-loader.gif" />
            </p:dialog>

            <p:confirmDialog global="true" showEffect="explode" hideEffect="explode">
                <p:commandButton value="Sí" type="button" styleClass="ui-confirmdialog-yes btn_peque" update="allform:tablaDeDatos"/>
                <p:commandButton value="No" type="button"  styleClass="ui-confirmdialog-no btn_peque" />
            </p:confirmDialog>
            <br/>
        </h:form>

        <div id="footer"></div>

        <p:idleMonitor timeout="#{1000*60*30}" id="idleSesion">
            <p:ajax event="idle" listener="#{idleMonitorCtrl.idleListener}"
                    oncomplete="PF('idleDialog').show()" />
        </p:idleMonitor>
        <p:dialog header="Sesión Caducada" resizable="false"
                  widgetVar="idleDialog" modal="true" closable="false" style="font-size: 12px">
            <h:form id="sesionCaducaForm">
                <div class="titlePage">
                    <h:outputText value="Sesión Caducada " />
                    <p:commandButton styleClass="nav-link js-scroll-trigger"
                                     actionListener="#{loginBean.logout}"
                                     oncomplete="logout(xhr, status, args)"
                                     value="ACEPTAR" immediate="true" style="font-size: 12px"/>
                </div>
            </h:form>
        </p:dialog>

        <!-- JavaScript libs are placed at the end of the document so the pages load faster -->

        <!-- <script src="resources/assets/js/headroom.min.js"></script>
        <script src="resources/assets/js/jQuery.headroom.min.js"></script>
        <script src="resources/assets/js/template.js"></script> -->

    </h:body>
    <script type="text/javascript">
        $(document).ready(function () {
            setTimeout(function () {
                $('body').addClass('loaded');
                $('h1').css('color', '#222222');
                $("#footer").load("footer.html");
            }, 150);
        });

        function getIdIndex(idName) {
            var doc = document.forms['allform'];
            var i;
            var idResult = 0;
            for (i = 0; doc.length > i; i++) {
                if (doc[i].id.includes(idName)) {
                    idResult = i;
                    console.log(doc[i].id);
                    break;
                }
            }
            return idResult;
        }

        //<![CDATA[
        function popupwindow(url, title, args) {
            if (args.doit) {
                //window.open(url, title, 'location=yes,height=400,width=400,scrollbars=yes,status=yes').focus();
                window.open(url, title);
            }
        }

        function otherpage(url) {
            setTimeout(function () {
                window.open(url, '_blank');
            }, 0);
        }
        function logout(xhr, status, args) {
            setTimeout(function () {
                window.location = 'login.xhtml';
            }, 500);
        }
        //]]>
    </script>
</html>
