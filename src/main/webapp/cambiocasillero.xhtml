<!DOCTYPE html>
<html xmlns="http://www.w3c.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"
      xmlns:x="http://xpert.com/faces">
    <h:head>
        <meta charset="utf-8" />
        <meta name="viewport"    content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="" />

        <title>CAMBIO CASILLERO</title>

        <link rel="shortcut icon" type="image/png" href="#{resource['images/favicon.png']}" />
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"/>

        <link rel="stylesheet" media="screen" href="http://fonts.googleapis.com/css?family=Open+Sans:300,400,700" />
        <link href="#{resource['assets/css/bootstrap.min.css']}" rel="stylesheet" />
        <link href="#{resource['assets/css/font-awesome.min.css']}" rel="stylesheet" />

        <!-- Custom styles for our template -->
        <!--<link href="resources/assets/css/bootstrap-theme.css" rel="stylesheet" />-->
        <link href="#{resource['assets/css/bootstrap-theme.css']}" rel="stylesheet" />
        <!--<link href="resources/assets/css/main.css" rel="stylesheet" /> -->
        <link href="#{resource['assets/css/main.css']}" rel="stylesheet" />

        <!-- My own style css -->
        <link href="#{resource['assets/css/style.css']}" rel="stylesheet" />
        <meta http-equiv="Refresh" content="#{loginBean.grupo eq 'SC_CambioCasillero'? '':'0.1;url=index.xhtml'}"/>
    </h:head>
    <h:body>
        <!-- Start Page Loading -->
        <div id="loader-wrapper">
            <div id="loader"></div>        
            <div class="loader-section section-left"></div>
            <div class="loader-section section-right"></div>
        </div>
        <p:growl id="mensajes" showDetail="true" life="4000"/>
        <h:form id="allform" enctype="multipart/form-data" style=" background: #e3e3e3; min-height: calc(100vh - 424px);">
            <div class="menu">
                <a href="#" class="logo"  title="Logo Senadi" ><img src="#{resource['images/sena_2.png']}" width="161px"/></a>

                <i id="edit_action" class="material-icons prefix" style="color: white; margin-left: 20px; display: inline-block">person</i>

                <p:outputLabel value="#{loginBean.nombre}" style="color: white; font-size: 18px; margin-left: 5px;" />

                <div style="float: right; display: inline-block; margin-top: 5px">                                 
                    <p:commandLink styleClass="btn_logout" actionListener="#{loginBean.logout}"
                                   oncomplete="logout(xhr, status, args)"
                                   title="CERRAR SESIÓN" immediate="true">
                        <i class="material-icons" style="font-size: 30px; ">exit_to_app</i>
                    </p:commandLink>
                </div>                                
                <a class="itemm" href="users.xhtml" title="Cambio Casillero" 
                   style="display: #{loginBean.grupo eq 'SC_CambioCasillero' and loginBean.usuarioCambioCasillero.tipo eq 'ADMINISTRADOR'?'block':'none'}">USUARIOS</a>                   
                <a class="activo" href="#" title="Cambio Casillero" 
                   style="display: #{loginBean.grupo eq 'SC_CambioCasillero'?'block':'none'}">CAMBIO CASILLERO</a>
                <a class="itemm" href="index.xhtml" title="Trámites" >TRAMITES</a>
            </div>

            <br/>
            <div style="text-align: center !important; margin: 0 auto !important;">
                <p:outputLabel value="CAMBIOS DE CASILLERO"  style="font-size: 14px; color: black;"/>
                <p:dataTable id="tablaDeCambios" var="cambio"
                             value="#{cambioCasilleroBean.cambiosCasillero}" widgetVar="tablaDeCambios"
                             emptyMessage="No hay Datos para mostrar"                                              
                             filteredValue="#{cambioCasilleroBean.cambiosCasilleroFiltrados}"
                             binding="#{cambioCasilleroBean.cambiosCasilleroDataTable}"
                             paginator="true"
                             paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                             rows="20"
                             rowsPerPageTemplate="20,50,100,150,200,250,300"
                             style="border: black !important" >

                    <f:facet name="header">
                        <p:outputPanel>
                            <h:outputText value="BUSCAR EN TODOS: " />
                            <p:inputText id="globalFilter" onkeyup="PF('tablaDeConocimientos').filter()"
                                         style="width:300px" placeholder="Escriba aquí"/>
                            <p:panel style="border: 1px solid white; float: right">
                                <p:outputLabel value="." styleClass="estiloAzul" style="float: right; color: #0293C3 !important;"/>
                                <p:outputLabel value="PENDIENTE" style="float: right; vertical-align: middle"/>
                                <p:outputLabel value="." styleClass="estiloVerde" style="float: right; color: #5EA226 !important"/>
                                <p:outputLabel value="REALIZADO" style="float: right; vertical-align: middle"/>
                                <br/>
                            </p:panel>
                        </p:outputPanel>
                    </f:facet>

                    <p:column headerText="Providencia" style="text-align: center;" filterBy="#{cambio.providencia}" filterMatchMode="contains">                                                
                        <p:commandLink id="notlink"  style="color: #0089ec; font-size: 16px !important; font-weight: bold;" process="@this" value="#{cambio.providencia}"
                                       title="Visualizar Providencia #{cambio.providencia}" actionListener="#{cambioCasilleroBean.validarProvidencia(cambio)}"
                                       oncomplete="if(args.viewdoc){otherpage(args.view)};" update="mensajes notlink" rendered="#{cambio.estado eq 'REALIZADO'?true:false}"/>
                        <h:outputText value="#{cambio.providencia}" rendered="#{cambio.estado eq 'PENDIENTE'?true:false}"/>
                    </p:column>


                    <p:column headerText="Trámite" style="text-align: center;" filterBy="#{cambio.tramite}" >
                        <h:outputText value="#{cambio.tramite}" />
                    </p:column>

                    <p:column headerText="Denominación" style="text-align: center;" filterBy="#{cambio.denominacion}" >
                        <h:outputText value="#{cambio.denominacion}" />
                    </p:column>

                    <p:column headerText="Titular Anterior" style="text-align: center;" filterBy="#{cambio.titularCasilleroAnterior}" >
                        <h:outputText value="#{cambio.titularCasilleroAnterior}" />
                    </p:column>                            

                    <p:column headerText="Casillero Anterior" style="text-align: center;" filterBy="#{cambio.casilleroAnterior}" >
                        <h:outputText value="#{cambio.casilleroAnterior}" />
                    </p:column>

                    <p:column headerText="Titular Nuevo" style="text-align: center;" filterBy="#{cambio.titularCasilleroNuevo}" >
                        <h:outputText value="#{cambio.titularCasilleroNuevo}" />
                    </p:column>

                    <p:column headerText="Casillero Nuevo" style="text-align: center;" filterBy="#{cambio.nuevoCasillero}" >
                        <h:outputText value="#{cambio.nuevoCasillero}" />
                    </p:column>

                    <p:column headerText="F. Providencia" style="text-align: center;" filterBy="#{cambio.fechaProvidencia}" >
                        <h:outputText value="#{cambio.fechaProvidencia}" >
                            <f:convertDateTime pattern="yyyy-MM-dd" />
                        </h:outputText>
                    </p:column>
                    
                    <p:column headerText="Usuario Elabora" style="text-align: center;" filterBy="#{cambio.usuario}" >
                        <h:outputText value="#{cambio.usuario}" >
                            <f:convertDateTime pattern="yyyy-MM-dd" />
                        </h:outputText>
                    </p:column>

                    <p:column headerText="Estado" style="text-align: center;" filterBy="#{cambio.estado}" >
                        <h:outputText value="#{cambio.estado}" />
                        <p:outputLabel value="." styleClass="#{cambio.estado eq 'PENDIENTE'?'estiloAzul':'estiloVerde'}"
                                       style="margin-left: 3px;"/>
                    </p:column>

                    <p:column  headerText="Acción" style="text-align: center; width: 5%" >
                        <p:commandLink class="linkcam" title="Download Providencia"
                                       actionListener="#{cambioCasilleroBean.viewProvidencia}"
                                       process="@this" disabled="#{cambio.estado eq 'PENDIENTE'?false:true}"
                                       update="mensajes tablaDeCambios" oncomplete="popupwindow('cambiocas', '_blank', args);">
                            <i class="pi pi-download" style="font-size: 2rem"></i>
                            <!--<p:confirm header="CONFIRMAR" message="{cambio.providencia} - SE ACTUALIZARÁ LA FECHA DE PROVIDENCIA, CONTINUAR?"/>-->
                        </p:commandLink>
                        <p:commandLink class="linkcam" title="Upload Providencia"
                                       actionListener="#{cambioCasilleroBean.prepararProvidencia}"
                                       process="@this" style="margin-left: 10px;" disabled="#{cambio.estado eq 'PENDIENTE'?false:true}"
                                       update="mensajes allform:dlgProvidencia" oncomplete="if(args.uplo){PF('dlgProvidencia').show();}">
                            <i class="pi pi-upload" style="font-size: 2rem"></i>
                        </p:commandLink>

                    </p:column>

                    <f:facet name="footer">
                        <span class="font-bold">#{cambioCasilleroBean.cambiosCasillero.size()} registros.</span>
                    </f:facet>
                </p:dataTable>
            </div>

            <p:dialog id="dlgProvidencia" modal="true" resizable="true"
                      header="ADJUNTAR PROVIDENCIA #{cambioCasilleroBean.cambioCasillero.providencia}" fitViewport="true"
                      widgetVar="dlgProvidencia" style="font-size: 11px; text-align: center;" showEffect="explode" 
                      hideEffect="explode" closeOnEscape="true" width="40%">
                <p:ajax event="close" update="dlgProvidencia" resetValues="true" />
                <h:form id="frmProvidencia" enctype="multipart/form-data">
                    <p:fileUpload id="fileup" skinSimple="true" mode="simple" label="ADJUNTAR PROVIDENCIA FIRMADA" accept=".pdf" update="mensajes"
                                  uploadLabel="SUBIR" value="#{cambioCasilleroBean.file}" title="ADJUNTE LA PROVIDENCIA FIRMADA"
                                  rendered="#{cambioCasilleroBean.cambioCasillero.providencia eq null?false:true}" 
                                  widgetVar="fileup" class="fileupcustom"/>
                    <br/><br/>
                    <p:commandButton value="GUARDAR DOCUMENTO" actionListener="#{cambioCasilleroBean.guardarDocumento}" class="btn_buscar"
                                     process="@form" update="mensajes allform:tablaDeCambios" oncomplete="if(args.provid){PF('dlgProvidencia').hide();}">
                        <p:confirm header="CONFIRMAR" message="SEGURO DE ADJUNTAR LA PROVIDENCIA FIRMADA?"/>
                    </p:commandButton>
                    <p:commandButton value="CERRAR" onclick="PF('dlgProvidencia').hide()" class="btn_cerrar"/>
                </h:form>
            </p:dialog>

            <p:dialog id="dlgConfiguracion" modal="true" resizable="true"
                      header="CONFIGURACIÓN PARA CAMBIO DE CASILLERO" fitViewport="true"
                      widgetVar="dlgConfiguracion" style="font-size: 11px; text-align: center;" showEffect="explode" 
                      hideEffect="explode" closeOnEscape="true" width="80%">
                <p:ajax event="close" update="dlgConfiguracion" resetValues="true" />

                <h:form id="frmConfig" >
                    <p:dataTable id="tablaDeConfig" var="config"
                                 value="#{tramiteBean.configuraciones}" widgetVar="tablaDeDelegados"
                                 emptyMessage="No hay Datos para mostrar"                                              
                                 binding="#{tramiteBean.configDataTable}"                                 
                                 paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                 rows="20"
                                 rowsPerPageTemplate="20,50,100,150,200,250,300"
                                 style="border: black !important" 
                                 rowKey="#{config.id}"
                                 editable="true">

                        <p:ajax event="rowEdit" listener="#{tramiteBean.onRowEditConfig}" update="mensajes"/>
                        <p:ajax event="rowEditCancel" listener="#{tramiteBean.onRowCancelConfig}" update="mensajes"/>

                        <p:column headerText="Tipo" style="text-align: center;"  >
                            <p:cellEditor>
                                <f:facet name="output">
                                    <h:outputText value="#{config.tipo}"/>
                                </f:facet>
                                <f:facet name="input">
                                    <p:selectOneMenu value="#{config.tipo}" id="tiposs"  class="maxsize">
                                        <f:selectItem itemLabel="Seleccione una opción" itemValue="" noSelectionOption="true"/>
                                        <f:selectItems value="#{tramiteBean.tiposConfiguracionCC}"/>
                                    </p:selectOneMenu>
                                </f:facet>
                            </p:cellEditor>
                        </p:column>

                        <p:column headerText="Descripción" style="text-align: center;"  >
                            <p:cellEditor>
                                <f:facet name="output">
                                    <h:outputText value="#{config.nombre}"/>
                                </f:facet>
                                <f:facet name="input">
                                    <p:inputTextarea value="#{config.nombre}" style="width:100%"/>
                                </f:facet>
                            </p:cellEditor>
                        </p:column>

                        <p:column headerText="Fecha" style="text-align: center;"  >
                            <p:cellEditor>                               
                                <f:facet name="output">
                                    <h:outputText value="#{config.fecha}" >
                                        <f:convertDateTime pattern="yyyy-MM-dd"/>
                                    </h:outputText>
                                </f:facet>
                                <f:facet name="input" >
                                    <p:calendar value="#{config.fecha}" inputStyleClass="maxsize center-text" pattern="yyyy-MM-dd" navigator="true"
                                                disabled="#{(config.tipo eq 'DELEGADO' or config.tipo eq 'DELEGACIÓN')?true: false}"/>
                                </f:facet>

                            </p:cellEditor>
                        </p:column>

                        <p:column style="width:6rem">
                            <p:rowEditor editTitle="Editar Delegado" cancelTitle="Cancelar" saveTitle="Guardar Cambios"/>
                        </p:column>

                        <p:column headerText="Activo" style="text-align: center;"  >
                            <p:selectBooleanCheckbox id="deles" value="#{config.activo}"  itemLabel="#{config.activo?'ACTIVO':'INACTIVO'}" >
                                <p:ajax update="tablaDeConfig mensajes" listener="#{tramiteBean.enableConfiguracion(config)}"/>
                            </p:selectBooleanCheckbox>
                        </p:column>

                        <p:column >
                            <p:commandLink class="link_remove" actionListener="#{tramiteBean.eliminarConfiguracionCC}"
                                           update="tablaDeConfig mensajes" title="Eliminar Configuración" process="@this" >
                                <i id="delete_action" class="material-icons md-18">delete</i>
                                <p:confirm header="CONFIRMAR" message="SEGURO DE ELIMINAR EL REGISTRO #{config.nombre}?"/>
                            </p:commandLink>
                        </p:column>

                    </p:dataTable>
                    <br/>
                    <p:commandButton value="NUEVO REGISTRO" class="btn_peque" action="#{tramiteBean.onAddNewRegistro()}" 
                                     process="@this" update="mensajes tablaDeConfig" icon="pi pi-plus-circle"/>
                    <p:commandButton value="CERRAR" class="btn_peque" onclick="PF('dlgConfiguracion').hide();"/>

                </h:form>
            </p:dialog>

            <p:ajaxStatus onstart="PF('statusDialog').show()" onsuccess="PF('statusDialog').hide()" />

            <p:dialog widgetVar="statusDialog" modal="true" draggable="false" closable="false" resizable="false" showHeader="false">
                <p:graphicImage name="/images/ajax-loader.gif" />
            </p:dialog>

            <p:confirmDialog global="true" showEffect="explode" hideEffect="explode">
                <p:commandButton value="Sí" type="button" styleClass="ui-confirmdialog-yes btn_peque" update="allform:tablaDeDatos"/>
                <p:commandButton value="No" type="button"  styleClass="ui-confirmdialog-no btn_peque" />
            </p:confirmDialog>
            <br/>
        </h:form>

        <!--<div class="menuflot">
            <a class="item" role="button" href="#ref1" style="background: #00e5ff !important">CASILLERO</a>
            <br/>
            <a class="item" role="button" href="#ref2" style="background: #aed581 !important">TRÁMITE AFECTADO</a>
            <br/>
            <a class="item" role="button" href="#ref3" style="background: #f4b400 !important">NO VISIBLE</a>            
        </div>-->

        <div id="footer"></div>

        <p:idleMonitor timeout="#{1000*60*120}" id="idleSesion">
            <p:ajax event="idle" listener="#{idleMonitorCtrl.idleListener}"
                    oncomplete="PF('idleDialog').show()" />
        </p:idleMonitor>
        <p:dialog header="Sesión Caducada" resizable="false"
                  widgetVar="idleDialog" modal="true" closable="false" style="font-size: 12px">
            <h:form id="sesionCaducaForm">
                <div class="titlePage">
                    <h:outputText value="Sesión Caducada " />
                    <p:commandButton styleClass="nav-link js-scroll-trigger"
                                     actionListener="#{loginBean.logout}" class="btn_peque"
                                     oncomplete="logout(xhr, status, args)"
                                     value="ACEPTAR" immediate="true" style="font-size: 12px"/>
                </div>
            </h:form>
        </p:dialog>

        <!-- JavaScript libs are placed at the end of the document so the pages load faster -->

        <!-- <script src="resources/assets/js/headroom.min.js"></script>
        <script src="resources/assets/js/jQuery.headroom.min.js"></script>
        <script src="resources/assets/js/template.js"></script> -->

    </h:body>
    <script type="text/javascript">
        $(document).ready(function () {
            setTimeout(function () {
                $('body').addClass('loaded');
                $('h1').css('color', '#222222');
                $("#footer").load("footer.html");
            }, 150);
        });

        function getIdIndex(idName) {
            var doc = document.forms['allform'];
            var i;
            var idResult = 0;
            for (i = 0; doc.length > i; i++) {
                if (doc[i].id.includes(idName)) {
                    idResult = i;
                    console.log(doc[i].id);
                    break;
                }
            }
            return idResult;
        }

        //<![CDATA[
        function popupwindow(url, title, args) {
            if (args.doit) {
                //window.open(url, title, 'location=yes,height=400,width=400,scrollbars=yes,status=yes').focus();
                window.open(url, title);
            }
        }

        function otherpage(url) {
            setTimeout(function () {
                window.open(url, '_blank');
            }, 0);
        }
        function logout(xhr, status, args) {
            setTimeout(function () {
                window.location = 'login.xhtml';
            }, 500);
        }
        //]]>
    </script>
</html>
